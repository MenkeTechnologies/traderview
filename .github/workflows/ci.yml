name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # src-tauri requires GTK/Webkit system libs not present on the runner;
      # exclude it from Linux workspace builds. macOS handles it fine via
      # the dedicated release-build job below.
      - run: cargo check --workspace --all-targets --locked --exclude traderview-desktop

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The unit tests in -core and -import are pure compute (no DB needed).
      # src-tauri excluded everywhere — it has no library tests, only the
      # GUI entry point that depends on platform GTK/Webkit libs.
      - run: cargo test --workspace --locked --no-fail-fast --lib --exclude traderview-desktop
      # --lib skips doctests; run them explicitly so indented doc-comment
      # blocks that rustdoc compiles as code can't silently break.
      - run: cargo test --workspace --locked --no-fail-fast --doc --exclude traderview-desktop

  frontend-test:
    name: Frontend JS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # node --test is a built-in runner (Node 18+) — no npm install needed.
      # The frontend has zero dependencies; tests live under frontend/tests/.
      - name: Run frontend tests
        run: node --test frontend/tests/*.test.mjs

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Format check is informational for now (no rustfmt.toml committed).
      - run: cargo fmt --all --check || true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked --exclude traderview-desktop

  release-build:
    name: Release Build
    needs: [check, test]
    runs-on: ${{ matrix.os }}
    # Concurrency lives here, not at workflow level: a workflow-level group
    # holds one pending run max, so rapid pushes silently cancelled queued
    # runs (tests never ran) and the survivor queued behind a 60-90 min
    # release build. Scoped per-target so matrix legs don't serialize each
    # other; cancel-in-progress drops superseded builds of stale commits.
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: true
    # macos aarch64 release build sits near 60 min on the hosted
    # runner — 1h0m22s on c6d535eadb tipped it past the previous
    # 60-min cap. 90 buys headroom while the workspace keeps growing.
    timeout-minutes: 90
    # No sccache: measured 0 cache hits over a full 35-min Linux build
    # (run 27441922376) — deps come from rust-cache already, and the
    # long pole is traderview-web's own release codegen, which changes
    # every commit and can never hit a content-addressed cache.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build server binary
        run: cargo build --release --locked -p traderview-web --bin server --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: traderview-server-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/server

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh

  polish-gates:
    name: Polish gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/man-page-no-trailing-whitespace.sh
      - run: bash tests/man-page-final-newline.sh
      - run: bash tests/man-page-synopsis-section.sh
      - run: bash tests/tests-shell-executable.sh
      - run: bash tests/tests-shell-shebang.sh

  semantic-gates:
    name: Semantic gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-has-h1.sh
      - run: bash tests/docs-no-deprecated-tags.sh
      - run: bash tests/docs-no-placeholder-href.sh

  newline-gates:
    name: Newline + README gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/readme-final-newline.sh
      - run: bash tests/docs-final-newline.sh
      - run: bash tests/workflow-final-newline.sh
      - run: bash tests/cargo-final-newline.sh
      - run: bash tests/readme-has-https-link.sh

  structure-gates:
    name: Structure gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/readme-has-h2-section.sh
      - run: bash tests/readme-has-badges.sh
      - run: bash tests/docs-has-html-closing.sh
      - run: bash tests/docs-has-body-tag.sh
      - run: bash tests/workflow-no-tabs.sh
