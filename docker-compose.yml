services:
  postgres:
    image: postgres:16-alpine
    container_name: traderview-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: traderview
      POSTGRES_PASSWORD: traderview
      POSTGRES_DB: traderview
    ports:
      - "5432:5432"
    volumes:
      - traderview_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traderview -d traderview"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  traderview_pg_data:
